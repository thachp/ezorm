name: Release npm Packages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-npm.yml"
      - "packages/**/package.json"
      - "scripts/npm-release.mjs"
      - "scripts/npm-release-manifest.mjs"
      - "scripts/proxy-packaging.mjs"

concurrency:
  group: release-npm
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_status.outputs.version }}
      should_release: ${{ steps.release_status.outputs.should_release }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read release status
        id: release_status
        shell: bash
        run: |
          STATUS_JSON="$(node ./scripts/npm-release.mjs release-status)"
          echo "json=${STATUS_JSON}" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'JSON.parse(process.argv[1]).version' "$STATUS_JSON")" >> "$GITHUB_OUTPUT"
          echo "should_release=$(node -p 'JSON.parse(process.argv[1]).shouldRelease' "$STATUS_JSON")" >> "$GITHUB_OUTPUT"

      - name: Report skipped release
        if: steps.release_status.outputs.should_release != 'true'
        env:
          VERSION: ${{ steps.release_status.outputs.version }}
        run: echo "Release ${VERSION} is already published on npm; skipping build, publish, and tag."

  build_js_packages:
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.should_release == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack JavaScript packages
        run: pnpm pack:packages

      - name: Upload JavaScript package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-js-packages
          path: .artifacts/npm-packages/*.tgz
          if-no-files-found: error

  build_proxy_binaries:
    needs: preflight
    if: needs.preflight.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Pack proxy binary package
        run: node ./scripts/npm-release.mjs pack-proxy-binary ${{ matrix.target }} .artifacts/npm-binaries

      - name: Upload proxy binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-${{ matrix.target }}
          path: .artifacts/npm-binaries/*.tgz
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build_js_packages
      - build_proxy_binaries
    if: needs.preflight.outputs.should_release == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js for npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: .artifacts/release
          pattern: "*"

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node ./scripts/npm-release.mjs publish-artifacts .artifacts/release

      - name: Create and push release tag
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        shell: bash
        run: |
          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists on origin" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
